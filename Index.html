<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>IRON KNEE — Pro Recovery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
/* ══ THEMES ══ */
:root{
  --fd:'Syne',sans-serif; --fb:'Plus Jakarta Sans',sans-serif;
  --bg:#0B1120;--bg2:#111827;--card:#141E2E;--card2:#1A2740;
  --border:#1F3050;--border2:#2A4068;
  --t1:#EDF2FF;--t2:#8BA4C0;--t3:#4A6480;
  --ac:#00E5C0;--acd:rgba(0,229,192,.12);--acb:rgba(0,229,192,.25);
  --ac2:#FF6B35;--ac3:#4A9EFF;--warm:#FFB84D;--danger:#FF4D6A;--ok:#22C55E;
  --ph1:#00E5C0;--ph2:#4A9EFF;--ph3:#A855F7;--ph4:#FF4D6A;--ph5:#FFB84D;--ph6:#22C55E;--ph7:#FF6B35;
  --shad:0 8px 32px rgba(0,0,0,.4);--r:16px;--rs:10px;
}
/* DARK THEMES */
.t-ocean{--bg:#020B18;--bg2:#041424;--card:#071E32;--card2:#0B2840;--border:#0D3050;--border2:#1A4A70;--t1:#D6EEFF;--t2:#6A9FC0;--t3:#2A5A80;--ac:#00C8FF;--acd:rgba(0,200,255,.12);--acb:rgba(0,200,255,.25)}
.t-crimson{--bg:#130A0A;--bg2:#1E0F0F;--card:#1A0D0D;--card2:#240F0F;--border:#3D1515;--border2:#5A2020;--t1:#FFE8E8;--t2:#B87070;--t3:#6B3535;--ac:#FF3A5C;--acd:rgba(255,58,92,.12);--acb:rgba(255,58,92,.25);--ac2:#FF9A00}
.t-forest{--bg:#070F09;--bg2:#0D1A10;--card:#0E1C12;--card2:#142218;--border:#1B3520;--border2:#2A5030;--t1:#E0F5E5;--t2:#6BA078;--t3:#2E5A38;--ac:#30D158;--acd:rgba(48,209,88,.12);--acb:rgba(48,209,88,.25);--ac2:#FFD60A}
.t-aurora{--bg:#08060F;--bg2:#100C1A;--card:#120E1E;--card2:#181228;--border:#2A1F45;--border2:#3D2E60;--t1:#EEE5FF;--t2:#8A75B5;--t3:#4A3870;--ac:#BF5AF2;--acd:rgba(191,90,242,.12);--acb:rgba(191,90,242,.25);--ac2:#FF9F0A}
.t-golden{--bg:#120E04;--bg2:#1A1508;--card:#1E1A0A;--card2:#26200E;--border:#3D3010;--border2:#5A4818;--t1:#FFF3D6;--t2:#B8960A;--t3:#6B5800;--ac:#FFD60A;--acd:rgba(255,214,10,.12);--acb:rgba(255,214,10,.25);--ac2:#FF6B35}
/* LIGHT THEMES */
.t-light{--bg:#F0F4F8;--bg2:#E8EEF4;--card:#FFFFFF;--card2:#F5F8FC;--border:#D0DBE8;--border2:#B8CDD8;--t1:#0D1B2E;--t2:#4A6480;--t3:#8BA4B8;--ac:#0066FF;--acd:rgba(0,102,255,.08);--acb:rgba(0,102,255,.2);--ac2:#FF5733;--ac3:#7C3AED;--shad:0 4px 20px rgba(0,0,0,.08)}
.t-rose{--bg:#FFF5F7;--bg2:#FFE8EE;--card:#FFFFFF;--card2:#FFF0F4;--border:#FFCCD6;--border2:#FFB3C1;--t1:#2D0A14;--t2:#8B4A5A;--t3:#C4909A;--ac:#E91E63;--acd:rgba(233,30,99,.08);--acb:rgba(233,30,99,.2);--ac2:#FF6B35;--ac3:#9C27B0;--shad:0 4px 20px rgba(233,30,99,.1)}
.t-mint{--bg:#F0FBF6;--bg2:#E0F5EB;--card:#FFFFFF;--card2:#F0FAF5;--border:#B8E8CC;--border2:#8FD4B0;--t1:#0A2818;--t2:#2E7D52;--t3:#5BA878;--ac:#00875A;--acd:rgba(0,135,90,.08);--acb:rgba(0,135,90,.2);--ac2:#FF6B35;--ac3:#0066FF;--shad:0 4px 20px rgba(0,135,90,.08)}
.t-sky{--bg:#EFF6FF;--bg2:#DBEAFE;--card:#FFFFFF;--card2:#EFF6FF;--border:#BFDBFE;--border2:#93C5FD;--t1:#0A1628;--t2:#1D4ED8;--t3:#60A5FA;--ac:#2563EB;--acd:rgba(37,99,235,.08);--acb:rgba(37,99,235,.2);--ac2:#F59E0B;--ac3:#7C3AED;--shad:0 4px 20px rgba(37,99,235,.08)}
.t-sand{--bg:#FDF8F0;--bg2:#F5EDD8;--card:#FFFFFF;--card2:#FBF6EC;--border:#E8D9BF;--border2:#D4C09A;--t1:#2C1A00;--t2:#7A5C2A;--t3:#B89860;--ac:#D4820A;--acd:rgba(212,130,10,.08);--acb:rgba(212,130,10,.2);--ac2:#E91E63;--ac3:#2E7D52;--shad:0 4px 20px rgba(212,130,10,.08)}

html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--fb);color:var(--t1);font-size:15px}
#app{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg)}

/* ══ SPLASH ══ */
#splash{position:absolute;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
.spl-rings{position:relative;width:120px;height:120px;margin-bottom:24px}
.spl-ring{position:absolute;border-radius:50%;border:2px solid transparent;animation:spin 3s linear infinite}
.sr1{inset:0;border-top-color:var(--ac);animation-duration:2s}
.sr2{inset:14px;border-right-color:var(--ac2);animation-duration:3s;animation-direction:reverse}
.sr3{inset:28px;border-bottom-color:var(--ac3);animation-duration:4s}
.spl-ic{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px}
.spl-logo{font-family:var(--fd);font-size:30px;font-weight:800;letter-spacing:-1px}
.spl-logo span{color:var(--ac)}
.spl-tag{font-size:11px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.spl-bar{width:160px;height:2px;background:var(--border);border-radius:1px;margin-top:36px;overflow:hidden}
.spl-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));animation:loadBar 2.3s ease-out forwards}
.spl-pct{font-size:11px;color:var(--ac);margin-top:8px;letter-spacing:1px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loadBar{0%{width:0}100%{width:100%}}
.spl-out{animation:fadeOut .4s forwards}
@keyframes fadeOut{to{opacity:0;transform:scale(1.04)}}

/* ══ HEADER ══ */
#hdr{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.hdr-logo{font-family:var(--fd);font-size:19px;font-weight:800;color:var(--ac);letter-spacing:-.5px}
.hdr-logo em{color:var(--t2);font-style:normal}
.hdr-acts{display:flex;gap:7px}
.ibtn{width:34px;height:34px;border-radius:9px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--t2);transition:all .2s}
.ibtn:active{background:var(--acd);border-color:var(--acb);color:var(--ac)}
.wk-strip{display:flex;align-items:center;padding:0 16px 10px;gap:8px}
.wk-nb{width:28px;height:28px;border-radius:7px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--t2);flex-shrink:0;transition:all .15s}
.wk-nb:active{transform:scale(.9);background:var(--acd);color:var(--ac)}
.wk-info{flex:1;min-width:0}
.wk-title{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t1)}
.wk-sub{font-size:11px;color:var(--t2);margin-top:1px}
.wk-pb{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.wk-pbf{height:100%;border-radius:2px;transition:width .5s}
.ph-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ══ TABS ══ */
#tabs{flex-shrink:0;display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#tabs::-webkit-scrollbar{display:none}
.tab-wrap{position:relative}
.tab-wrap::after{content:"›";position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(90deg,transparent,var(--card));display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:14px;color:var(--t2);pointer-events:none}
.tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 11px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;color:var(--t3);white-space:nowrap;min-width:58px}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab-ic{font-size:16px;line-height:1}
.tab-lb{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* ══ SCREENS ══ */
#screens{flex:1;overflow:hidden;position:relative}
.scr{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:20px}
.scr.on{display:block}
.scr::-webkit-scrollbar{width:3px}
.scr::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ══ SHARED COMPONENTS ══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:var(--r)}
.sec-hd{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.sec-hd-t{font-family:var(--fd);font-size:16px;font-weight:700}
.sec-hd-s{font-size:12px;color:var(--t2);cursor:pointer;color:var(--ac)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.2px;border:1px solid}
.chip-sets{background:rgba(74,158,255,.12);color:var(--ac3);border-color:rgba(74,158,255,.2)}
.chip-reps{background:var(--acd);color:var(--ac);border-color:var(--acb)}
.chip-hold{background:rgba(255,107,53,.12);color:var(--ac2);border-color:rgba(255,107,53,.2)}
.chip-tempo{background:rgba(168,85,247,.12);color:#C084FC;border-color:rgba(168,85,247,.2)}
.chip-vid{background:rgba(255,77,106,.12);color:#FF6B80;border-color:rgba(255,77,106,.2)}
.btn{padding:12px 20px;border-radius:12px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--ac);color:#000}
.btn-sec{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.btn-dan{background:rgba(255,77,106,.15);color:var(--danger);border:1px solid rgba(255,77,106,.25)}
.row-inp{width:100%;padding:11px 14px;background:var(--card2);border:1px solid var(--border);border-radius:11px;font-family:var(--fb);font-size:14px;color:var(--t1);outline:none;transition:border-color .2s}
.row-inp:focus{border-color:var(--ac)}
.row-inp::placeholder{color:var(--t3)}
label{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:5px}
.fadeUp{animation:fadeUp .3s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ══ TODAY ══ */
.t-hero{margin:14px 16px 0;border-radius:20px;padding:18px 20px;background:var(--card2);border:1px solid var(--border);position:relative;overflow:hidden}
.t-hero-glow{position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;opacity:.1;filter:blur(30px)}
.t-badge{display:inline-flex;align-items:center;gap:5px;background:var(--acd);border:1px solid var(--acb);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;color:var(--ac);letter-spacing:.5px;margin-bottom:10px}
.t-day{font-family:var(--fd);font-size:22px;font-weight:800;line-height:1.1;margin-bottom:4px}
.t-phase{font-size:12px;color:var(--t2)}
.t-hstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.ths{background:rgba(255,255,255,.04);border-radius:11px;padding:9px 7px;text-align:center;border:1px solid var(--border)}
.ths-n{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--ac)}
.ths-l{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* pain row */
.pain-row{display:flex;align-items:center;gap:8px;margin:10px 16px 0;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:11px}
.pain-lbl{font-size:11px;color:var(--t2);flex-shrink:0}
.pain-dots{display:flex;gap:5px;flex:1}
.pdot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--t3)}
.pdot.sel{color:#fff;border-color:transparent}
.pdot:nth-child(1).sel{background:#22C55E}
.pdot:nth-child(2).sel{background:#84CC16}
.pdot:nth-child(3).sel{background:#EAB308}
.pdot:nth-child(4).sel{background:#F97316}
.pdot:nth-child(5).sel{background:#EF4444}
/* day pills */
.day-scr{display:flex;gap:7px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
.day-scr::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;transition:all .2s}
.dpill.on{background:var(--ac);color:#000;border-color:var(--ac)}
/* exercise section */
.ex-sec-hd{display:flex;align-items:center;gap:8px;padding:0 16px;margin:14px 0 8px}
.ex-sec-line{height:1px;flex:1;background:var(--border)}
.ex-sec-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:10px}
.wu .ex-sec-lbl{background:rgba(255,184,77,.15);color:var(--warm);border:1px solid rgba(255,184,77,.25)}
.me .ex-sec-lbl{background:var(--acd);color:var(--ac);border:1px solid var(--acb)}
.cd .ex-sec-lbl{background:rgba(74,158,255,.12);color:var(--ac3);border:1px solid rgba(74,158,255,.25)}
.ex-card{margin:0 16px 8px;padding:13px 15px;background:var(--card);border:1px solid var(--border);border-radius:13px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.ex-card:active{border-color:var(--ac);transform:scale(.99)}
.ex-card.done{opacity:.55}
.ex-chk{position:absolute;right:12px;top:50%;transform:translateY(-50%) scale(.5);opacity:0;transition:all .25s;width:26px;height:26px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#000;font-weight:700}
.ex-card.done .ex-chk{opacity:1;transform:translateY(-50%) scale(1)}
.ex-nm{font-size:14px;font-weight:500;line-height:1.3;padding-right:34px;color:var(--t1);margin-bottom:7px}
.ex-meta{display:flex;gap:5px;flex-wrap:wrap}
/* complete banner */
.done-banner{margin:14px 16px;padding:14px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:13px;text-align:center}

/* ══ HEALTH HUB (new tab) ══ */
.hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
.hub-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.hub-card:active{transform:scale(.97);border-color:var(--ac)}
.hub-ic{font-size:28px;margin-bottom:8px;line-height:1}
.hub-title{font-family:var(--fd);font-size:13px;font-weight:700;margin-bottom:3px}
.hub-val{font-size:12px;color:var(--t2)}
.hub-accent{position:absolute;bottom:-10px;right:-10px;font-size:48px;opacity:.06;line-height:1}
.hub-prog{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.hub-prog-f{height:100%;border-radius:2px;transition:width .5s}

/* ══ WATER ══ */
.water-hero{margin:14px 16px 0;background:linear-gradient(135deg,rgba(0,200,255,.12),rgba(74,158,255,.08));border:1px solid rgba(0,200,255,.25);border-radius:20px;padding:20px;text-align:center}
.water-drops{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.wdrop{font-size:28px;cursor:pointer;transition:all .2s;opacity:.3;filter:grayscale(1)}
.wdrop.filled{opacity:1;filter:none;animation:dropIn .3s ease}
@keyframes dropIn{0%{transform:scale(1.4)}100%{transform:scale(1)}}
.water-info{font-family:var(--fd);font-size:36px;font-weight:800;color:#00C8FF}
.water-goal{font-size:13px;color:var(--t2);margin-top:4px}
.water-btns{display:flex;gap:10px;margin:12px 16px 0}

/* ══ ROM ══ */
.rom-chart{padding:0 16px;margin-bottom:16px}
.rom-entry{background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:8px;padding:14px 16px}
.rom-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rom-lbl{font-size:13px;font-weight:600;flex:1}
.rom-deg{font-family:var(--fd);font-size:24px;font-weight:800;color:var(--ac)}
.rom-bar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.rom-bar-f{height:100%;border-radius:4px;transition:width .5s}
.rom-range{display:flex;justify-content:space-between;font-size:10px;color:var(--t3)}
.rom-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:10px}
.rom-history{padding:0 16px}
.rh-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.rh-date{font-size:12px;color:var(--t2)}
.rh-vals{display:flex;gap:10px}
.rh-val{font-size:13px;font-weight:600}

/* ══ SLEEP ══ */
.sleep-hero{margin:14px 16px 0;background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(99,102,241,.08));border:1px solid rgba(168,85,247,.25);border-radius:20px;padding:20px;text-align:center}
.sleep-big{font-family:var(--fd);font-size:52px;font-weight:800;color:#A855F7;line-height:1}
.sleep-unit{font-size:14px;color:var(--t2)}
.sleep-quality{display:flex;gap:8px;justify-content:center;margin:14px 0 0}
.sq-dot{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:14px;color:var(--t3)}
.sq-dot.sel{border-color:var(--ac);background:var(--acd);color:var(--ac)}
.sq-dot span{font-size:8px;margin-top:2px}
.sleep-log{padding:0 16px}
.sl-bar-row{display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:6px}
.sl-bar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.sl-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:height .5s}
.sl-day{font-size:9px;color:var(--t3)}

/* ══ MOOD ══ */
.mood-ring{display:flex;gap:10px;justify-content:center;padding:20px 16px 0;flex-wrap:wrap}
.mood-btn{flex:0 0 auto;width:64px;height:70px;border-radius:16px;border:2px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;gap:4px}
.mood-btn.sel{border-color:var(--ac);background:var(--acd);transform:scale(1.05)}
.mood-ic{font-size:26px;line-height:1}
.mood-lb{font-size:9px;font-weight:600;color:var(--t2)}
.mood-hist{padding:0 16px;margin-top:16px}
.mh-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.mh-date{font-size:12px;color:var(--t2);flex:1}
.mh-ic{font-size:22px}
.mh-note{font-size:12px;color:var(--t2);flex:2;font-style:italic}

/* ══ BMI ══ */
.bmi-hero{margin:14px 16px 0;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:20px}
.bmi-gauge{text-align:center;margin:16px 0}
.bmi-num{font-family:var(--fd);font-size:56px;font-weight:800;line-height:1}
.bmi-cat{font-size:14px;font-weight:600;margin-top:4px}
.bmi-scale{height:10px;border-radius:5px;background:linear-gradient(90deg,#3B82F6,#22C55E,#EAB308,#F97316,#EF4444);margin:16px 0 6px;position:relative;overflow:visible}
.bmi-needle{position:absolute;top:-5px;width:4px;height:20px;background:var(--t1);border-radius:2px;transform:translateX(-50%);transition:left .8s ease;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.bmi-scale-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--t3)}
.bmi-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:14px}
.bmi-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px;margin-top:10px}
.bi-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center}
.bi-val{font-family:var(--fd);font-size:16px;font-weight:800}
.bi-lbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

/* ══ STEPS ══ */
.steps-hero{margin:14px 16px 0;background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(16,185,129,.08));border:1px solid rgba(34,197,94,.25);border-radius:20px;padding:20px;text-align:center}
.steps-big{font-family:var(--fd);font-size:52px;font-weight:800;color:var(--ok);line-height:1}
.steps-goal-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px}
.steps-week{display:flex;gap:6px;padding:0 16px;margin-top:14px}
.step-bar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.step-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;background:var(--ok);opacity:.5;transition:height .5s}
.step-bar.today{opacity:1}
.step-day{font-size:9px;color:var(--t3)}
.steps-add-row{display:flex;gap:8px;margin:12px 16px 0;flex-wrap:wrap}
.step-quick{padding:8px 14px;border-radius:20px;background:var(--acd);border:1px solid var(--acb);color:var(--ac);font-size:12px;font-weight:600;cursor:pointer}

/* ══ SWELLING ══ */
.swelling-row{display:flex;gap:10px;justify-content:center;padding:16px;flex-wrap:wrap}
.sw-btn{flex:0 0 auto;padding:12px 18px;border-radius:14px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;text-align:center}
.sw-btn.sel{border-color:var(--ac);background:var(--acd)}
.sw-ic{font-size:24px;margin-bottom:4px}
.sw-lb{font-size:11px;font-weight:600;color:var(--t2)}
.sw-btn.sel .sw-lb{color:var(--ac)}

/* ══ ICE/HEAT ══ */
.ih-choice{display:flex;gap:10px;margin:14px 16px 0}
.ih-btn{flex:1;padding:16px 10px;border-radius:14px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;text-align:center}
.ih-btn.sel-ice{border-color:#00C8FF;background:rgba(0,200,255,.1)}
.ih-btn.sel-heat{border-color:#FF6B35;background:rgba(255,107,53,.1)}
.ih-ic{font-size:32px;margin-bottom:6px}
.ih-lb{font-size:13px;font-weight:600}
.ih-timer-wrap{margin:16px;padding:20px;background:var(--card2);border:1px solid var(--border);border-radius:18px;text-align:center}
.ih-time{font-family:var(--fd);font-size:52px;font-weight:800;line-height:1}
.ih-ring{margin:10px auto}

/* ══ ACHIEVEMENTS ══ */
.ach-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px}
.ach-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;transition:all .2s}
.ach-card.unlocked{border-color:var(--warm);background:rgba(255,184,77,.08)}
.ach-card.locked{opacity:.45;filter:grayscale(.7)}
.ach-ic{font-size:30px;margin-bottom:6px}
.ach-name{font-size:10px;font-weight:700;color:var(--t1);margin-bottom:2px}
.ach-desc{font-size:9px;color:var(--t2);line-height:1.4}
.ach-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--warm);border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700}

/* ══ JOURNAL ══ */
.journal-form{padding:14px 16px 0}
.journal-entry{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 16px;margin-bottom:8px}
.je-date{font-size:11px;color:var(--t2);margin-bottom:6px}
.je-text{font-size:13px;color:var(--t1);line-height:1.6}
.je-mood{font-size:20px}
textarea.row-inp{resize:vertical;min-height:90px;line-height:1.6}

/* ══ MEDS ══ */
.med-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.med-ic{font-size:24px;flex-shrink:0}
.med-info{flex:1}
.med-name{font-size:14px;font-weight:500}
.med-time{font-size:12px;color:var(--t2);margin-top:2px}
.med-taken{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;transition:all .2s}
.med-taken.done{background:var(--ok);border-color:var(--ok);color:#fff}

/* ══ PROGRESS SCREEN ══ */
.prog-hero{margin:14px 16px 0;padding:18px;background:var(--card2);border:1px solid var(--border);border-radius:18px}
.ph-prog-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:9px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.ph-prog-card.cur{border-color:var(--ac)}
.ppc-top{padding:13px 15px;display:flex;align-items:center;gap:11px}
.ppc-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ppc-info{flex:1;min-width:0}
.ppc-name{font-family:var(--fd);font-size:13px;font-weight:700}
.ppc-desc{font-size:11px;color:var(--t2);margin-top:1px}
.ppc-bar-row{padding:0 15px 13px}
.ppc-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px}
.ppc-bar-f{height:100%;border-radius:3px;transition:width .6s}
.ppc-bar-meta{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--t2)}

/* ══ STATS ══ */
.stats-ring-wrap{display:flex;align-items:center;gap:18px;margin:14px 16px 0;padding:18px;background:var(--card2);border:1px solid var(--border);border-radius:18px}
.rw{position:relative;width:90px;height:90px;flex-shrink:0}
.rw svg{transform:rotate(-90deg)}
.rw-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rw-pct{font-family:var(--fd);font-size:24px;font-weight:800;color:var(--ac)}
.rw-lb{font-size:9px;color:var(--t2)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:7}
.ring-fg{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dasharray 1s}
.streak-card{margin:10px 16px 0;padding:14px 16px;background:linear-gradient(135deg,rgba(255,107,53,.12),rgba(255,184,77,.08));border:1px solid rgba(255,107,53,.25);border-radius:14px;display:flex;align-items:center;gap:12px}
.streak-fire{font-size:34px;animation:flicker 2s ease-in-out infinite}
@keyframes flicker{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:10px 16px 0}
.sg{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px}
.sg-n{font-family:var(--fd);font-size:24px;font-weight:800;margin-bottom:3px}
.sg-l{font-size:11px;color:var(--t2)}
.week-chart{padding:0 16px;margin-top:16px}
.wc-bars{display:flex;gap:4px;height:72px;align-items:flex-end;margin-top:10px}
.wcb-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wcb{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s}
.wcb-l{font-size:8px;color:var(--t3)}
.phase-prog-list{padding:0 16px;margin-top:16px}
.ppl-item{margin-bottom:12px}
.ppl-row{display:flex;justify-content:space-between;margin-bottom:4px}
.ppl-n{font-size:12px}
.ppl-pct{font-size:11px;font-weight:600}
.ppl-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.ppl-f{height:100%;border-radius:2px;transition:width .6s}

/* ══ SETTINGS ══ */
.set-wrap{padding:14px 16px 30px}
.set-sec{margin-bottom:18px}
.set-sec-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin-bottom:7px;padding:0 2px}
.set-card{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.set-row{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.set-row:last-child{border-bottom:none}
.set-row:active{background:var(--card2)}
.set-row-ic{font-size:19px;width:28px;text-align:center;flex-shrink:0}
.set-row-inf{flex:1;min-width:0}
.set-row-lbl{font-size:13px;font-weight:500}
.set-row-sub{font-size:11px;color:var(--t2);margin-top:1px}
.set-row-r{font-size:12px;color:var(--t2);flex-shrink:0}
.toggle{width:42px;height:23px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--ac)}
.toggle::after{content:'';position:absolute;width:17px;height:17px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(19px)}
.ac-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--acd);border:1px solid var(--acb);border-radius:10px;margin:8px 16px 0;font-size:12px;color:var(--ac)}
.ac-bar-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:acPulse 1.5s infinite}
@keyframes acPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:4px}
.t-swatch{border-radius:11px;padding:9px 6px;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px}
.t-swatch.sel{border-color:var(--ac)}
.sw-prev{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sw-nm{font-size:9px;font-weight:600;color:var(--t2);text-align:center}

/* ══ MODAL ══ */
#mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
#mod-bg.open{display:flex}
#modal{width:100%;max-width:430px;max-height:88vh;background:var(--card);border-radius:22px 22px 0 0;overflow-y:auto;padding:8px 0 38px;animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.mod-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.mod-badge{display:inline-flex;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;margin:0 20px 10px}
.mod-title{font-family:var(--fd);font-size:21px;font-weight:800;padding:0 20px;line-height:1.2;margin-bottom:14px}
.mod-specs{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 20px;margin-bottom:16px}
.ms{background:var(--card2);border-radius:11px;padding:11px;text-align:center;border:1px solid var(--border)}
.ms-v{font-family:var(--fd);font-size:19px;font-weight:800;color:var(--ac);margin-bottom:2px}
.ms-k{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.mod-notes{margin:0 20px 14px;padding:13px;background:rgba(255,184,77,.08);border:1px solid rgba(255,184,77,.2);border-radius:11px}
.mod-notes-l{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--warm);margin-bottom:5px}
.mod-notes-t{font-size:13px;color:var(--t1);line-height:1.6}
.mod-timer{margin:0 20px 14px;padding:14px;background:var(--card2);border:1px solid var(--border);border-radius:13px;text-align:center}
.mt-lbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px}
.mt-disp{font-family:var(--fd);font-size:38px;font-weight:800;color:var(--ac);letter-spacing:2px;margin:6px 0}
.mt-btns{display:flex;gap:7px;margin-top:10px}
.mt-btn{flex:1;padding:9px;border-radius:9px;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t1)}
.mt-btn.pri{background:var(--ac);color:#000;border-color:var(--ac)}
.set-tracker{margin:0 20px 14px}
.st-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t2);margin-bottom:7px}
.set-dots{display:flex;gap:7px}
.sdot{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--t3)}
.sdot.dn{background:var(--ac);color:#000;border-color:var(--ac)}
.mod-btns{padding:0 20px;display:flex;flex-direction:column;gap:7px}
.mbtn{width:100%;padding:13px;border-radius:12px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.mbtn:active{transform:scale(.98)}
.mbtn-vid{background:rgba(255,77,106,.15);color:#FF6B80;border:1px solid rgba(255,77,106,.25)}
.mbtn-pri{background:var(--ac);color:#000}
.mbtn-sec{background:var(--card2);color:var(--t2);border:1px solid var(--border)}

/* ══ REST TIMER ══ */
#rest-mod{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
#rest-mod.open{display:flex}
.rtw{background:var(--card);border-radius:24px;padding:28px 24px;width:calc(100% - 32px);max-width:340px;text-align:center;animation:pop .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.rtw-circle{width:140px;height:140px;margin:16px auto;position:relative}
.rtw-svg{transform:rotate(-90deg)}
.rtw-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rtw-n{font-family:var(--fd);font-size:34px;font-weight:800;color:var(--ac)}
.rtw-u{font-size:11px;color:var(--t2)}
.rtw-btns{display:flex;gap:9px;justify-content:center;margin-top:14px}
.rtw-btn{padding:11px 22px;border-radius:11px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;border:none}
.rtw-stop{background:var(--card2);color:var(--t1);border:1px solid var(--border)}
.rtw-go{background:var(--ac);color:#000}

/* ══ TOAST ══ */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:9px 16px;font-size:12px;font-weight:500;color:var(--t1);z-index:700;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;max-width:88vw;box-shadow:var(--shad)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ CONFETTI ══ */
.conf{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:999;animation:confFall 1.4s ease-out forwards}
@keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ══ RUNNING MODULE ══ */
.run-hero{margin:14px 16px 0;border-radius:20px;padding:20px;position:relative;overflow:hidden;background:linear-gradient(135deg,#0a1628,#162840);border:1px solid #1f3050}
.run-hero-glow{position:absolute;top:-30px;right:-30px;width:150px;height:150px;border-radius:50%;filter:blur(40px);opacity:.25}
.run-plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:16px}
.rplan-card{border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative;overflow:hidden}
.rplan-card:active{transform:scale(.97)}
.rplan-card.sel{border-color:rgba(255,255,255,.4)}
.rplan-ic{font-size:28px;margin-bottom:8px;line-height:1}
.rplan-name{font-family:var(--fd);font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.rplan-sub{font-size:10px;color:rgba(255,255,255,.7)}
.rplan-tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.rplan-wks{font-size:10px;color:rgba(255,255,255,.6);margin-top:4px}
/* Active Run Screen */
.run-map-wrap{height:260px;background:linear-gradient(135deg,#0d1b2e,#1a2f4a);border-radius:0;position:relative;overflow:hidden;margin-bottom:0}
#run-map{width:100%;height:100%;border:none}
.run-map-overlay{position:absolute;inset:0;pointer-events:none}
.run-stats-bar{background:var(--card);border-top:1px solid var(--border);padding:14px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rsb-item{text-align:center}
.rsb-val{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--ac)}
.rsb-lbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.run-controls{padding:14px 16px;display:flex;gap:10px}
.run-phase-banner{margin:0 16px 10px;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px}
/* Plan detail */
.plan-week-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.plan-week-row:active{background:var(--card2)}
.plan-week-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.plan-week-info{flex:1}
.plan-week-title{font-size:13px;font-weight:600;color:var(--t1)}
.plan-week-desc{font-size:11px;color:var(--t2);margin-top:2px}
.plan-day-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;margin:2px 3px}
.pdc-run{background:rgba(34,197,94,.15);color:#22C55E;border:1px solid rgba(34,197,94,.25)}
.pdc-walk{background:rgba(74,158,255,.12);color:var(--ac3);border:1px solid rgba(74,158,255,.2)}
.pdc-rest{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--border)}
.pdc-interval{background:rgba(255,107,53,.12);color:var(--ac2);border:1px solid rgba(255,107,53,.2)}
/* GPS trail */
.gps-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--ac);border:3px solid #fff;box-shadow:0 0 0 4px rgba(0,229,192,.3);animation:gpsPulse 2s infinite}
@keyframes gpsPulse{0%,100%{box-shadow:0 0 0 4px rgba(0,229,192,.3)}50%{box-shadow:0 0 0 8px rgba(0,229,192,0)}}

/* ══ MEDITATION MODULE ══ */
.med-hero{margin:14px 16px 0;border-radius:20px;padding:20px;background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(99,102,241,.1));border:1px solid rgba(139,92,246,.3);text-align:center;position:relative;overflow:hidden}
.breath-circle-wrap{position:relative;width:180px;height:180px;margin:0 auto}
.breath-svg{position:absolute;inset:0}
.breath-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.breath-phase{font-family:var(--fd);font-size:22px;font-weight:800;color:#a78bfa;text-align:center;line-height:1.2}
.breath-count{font-family:var(--fd);font-size:42px;font-weight:800;color:var(--t1);line-height:1}
.breath-instr{font-size:11px;color:var(--t2);letter-spacing:.5px;text-transform:uppercase}
@keyframes breatheExpand{0%{transform:scale(.75)}100%{transform:scale(1)}}
@keyframes breatheShrink{0%{transform:scale(1)}100%{transform:scale(.75)}}
.breath-types{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:14px}

.bt-card.sel{border-color:#a78bfa;background:rgba(167,139,250,.08)}
.bt-ic{font-size:24px;margin-bottom:6px;line-height:1}
.bt-name{font-family:var(--fd);font-size:12px;font-weight:700;margin-bottom:2px}

.ms-card:active{border-color:#a78bfa;transform:scale(.99)}

.ms-info{flex:1}
.ms-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px}
.ms-desc{font-size:11px;color:var(--t2)}
.ms-dur{font-size:11px;font-weight:700;color:#a78bfa;flex-shrink:0}

.med-active{position:fixed;inset:0;background:linear-gradient(180deg,#0a0618,#12082a);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.med-active.open{display:flex!important}
.ma-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff}
.ma-title{font-family:var(--fd);font-size:20px;font-weight:800;color:#fff;margin-bottom:6px;text-align:center}
.ma-cycle{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:30px;letter-spacing:.8px;text-transform:uppercase}
.ma-big-circle{position:relative;width:220px;height:220px;margin-bottom:30px}
.ma-phase-text{font-family:var(--fd);font-size:28px;font-weight:800;color:#a78bfa;text-align:center;margin-bottom:4px}
.ma-count-text{font-family:var(--fd);font-size:64px;font-weight:800;color:#fff;line-height:1;text-align:center}
.ma-instr{font-size:13px;color:rgba(255,255,255,.6);text-align:center;max-width:260px;line-height:1.6;margin-bottom:24px}
.ma-btns{display:flex;gap:12px}
.ma-btn{padding:13px 28px;border-radius:12px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.ma-btn:active{transform:scale(.96)}
.ma-stop{background:rgba(255,255,255,.1);color:#fff}
.ma-go{background:#a78bfa;color:#fff}
.ma-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}

// ═══ HELPERS ═══
function gPhase(w){return PHASES.find(p=>p.wks.includes(w))||PHASES[0];}
function dKey(w,d,id){return `${w}_${d}_${id}`;}
function isDone(w,d,id){return !!D.done[dKey(w,d,id)];}
function today(){return new Date().toDateString();}
function todayKey(){return new Date().toISOString().slice(0,10);}
function getDayEx(w,d){
  const wk=SCHED[String(w)];if(!wk||!wk[d])return[];
  const r=[];
  (wk[d].wu||[]).forEach(id=>r.push({id,sec:'wu'}));
  (wk[d].me||[]).forEach(id=>r.push({id,sec:'me'}));
  (wk[d].cd||[]).forEach(id=>r.push({id,sec:'cd'}));
  return r;
}
function hasHold(id){const h=EX[id][3];return h&&h!=='-'&&h!=='nan'&&h!=='';}
function hasVid(id){const v=EX[id][6];return v&&v.trim()&&v!=='nan'&&v!=='';}
function phasePct(p){
  let t=0,dn=0;
  p.wks.forEach(w=>{const wk=SCHED[String(w)];if(!wk)return;Object.keys(wk).forEach(d=>{getDayEx(w,d).forEach(({id})=>{t++;if(isDone(w,d,id))dn++;});});});
  return t?Math.round(dn/t*100):0;
}
function weekPct(w){
  let t=0,dn=0;
  const wk=SCHED[String(w)];if(!wk)return 0;
  Object.keys(wk).forEach(d=>{getDayEx(w,d).forEach(({id})=>{t++;if(isDone(w,d,id))dn++;});});
  return t?Math.round(dn/t*100):0;
}
function totalPct(){
  let t=0,dn=0;
  for(let w=1;w<=36;w++){const wk=SCHED[String(w)];if(!wk)continue;Object.keys(wk).forEach(d=>{getDayEx(w,d).forEach(({id})=>{t++;if(isDone(w,d,id))dn++;});});}
  return t?Math.round(dn/t*100):0;
}

function applyTheme(id){document.getElementById('app').className=id;D.theme=id;save('theme');}
function confetti(){
  const cols=['#00E5C0','#FF6B35','#4A9EFF','#FFB84D','#A855F7','#22C55E'];
  for(let i=0;i<20;i++){
    const el=document.createElement('div');el.className='conf';
    el.style.cssText=`left:${Math.random()*100}%;top:${10+Math.random()*20}%;background:${cols[i%6]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;animation-delay:${Math.random()*.5}s;animation-duration:${1+Math.random()}s`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
  }
}

}

  document.getElementById('s-iceheat').innerHTML=`
    <div class="sec-hd"><div class="sec-hd-t">❄️🔥 Ice / Heat Therapy</div><div class="sec-hd-s" onclick="goBack()">← Back</div></div>
    <div class="ih-choice">
      <div class="ih-btn${D.ihMode==='ice'?' sel-ice':''}" onclick="setIHMode('ice')">
        <div class="ih-ic">❄️</div><div class="ih-lb">Ice Therapy</div>
        <div style="font-size:11px;color:var(--t2);margin-top:4px">Reduce swelling</div>
      </div>
      <div class="ih-btn${D.ihMode==='heat'?' sel-heat':''}" onclick="setIHMode('heat')">
        <div class="ih-ic">🔥</div><div class="ih-lb">Heat Therapy</div>
        <div style="font-size:11px;color:var(--t2);margin-top:4px">Relax muscles</div>
      </div>
    </div>
    <div class="ih-timer-wrap">
      <div style="font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">${D.ihMode==='ice'?'ICE':'HEAT'} THERAPY TIMER</div>
      <div class="ih-time" style="color:${D.ihMode==='ice'?'#00C8FF':'#FF6B35'}" id="ih-display">${String(Math.floor(ihSecs/60)).padStart(2,'0')}:${String(ihSecs%60).padStart(2,'0')}</div>
      <div style="font-size:12px;color:var(--t2);margin-top:6px">Duration: ${Math.floor(D.ihCustom)} minutes</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:14px 0">
        ${presets.map(p=>`<div class="btn btn-sec" style="padding:8px 14px;font-size:12px" onclick="setIHTime(${p.m})">${p.l}</div>`).join('')}
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <div class="btn btn-sec" style="padding:12px 20px" onclick="resetIH()">Reset</div>
        <div class="btn btn-pri" style="padding:12px 24px;background:${D.ihMode==='ice'?'#00C8FF':'#FF6B35'}" id="ih-toggle" onclick="toggleIH()">${ihRunning?'Pause':'Start'}</div>
      </div>
    </div>
    <div style="padding:0 16px">
      <div style="padding:12px;background:${D.ihMode==='ice'?'rgba(0,200,255,.08)':'rgba(255,107,53,.08)'};border:1px solid ${D.ihMode==='ice'?'rgba(0,200,255,.2)':'rgba(255,107,53,.2)'};border-radius:11px">
        <div style="font-size:11px;font-weight:700;color:${D.ihMode==='ice'?'#00C8FF':'#FF6B35'};margin-bottom:4px">${D.ihMode==='ice'?'❄️ Ice Guidelines':'🔥 Heat Guidelines'}</div>
        <div style="font-size:12px;color:var(--t2)">${D.ihMode==='ice'?'Apply ice pack wrapped in cloth for 15–20 min after exercise. Never apply ice directly to skin. Elevate the leg if possible.':'Apply moist heat for 15–20 min before exercise to warm up muscles. Do not use heat on acute injuries or swelling.'}</div>
      </div>
    </div>`;
  if(ihRunning)startIHDisplay();
}
function setIHMode(m){D.ihMode=m;clearInterval(ihInterval);ihRunning=false;ihSecs=0;rIceHeat();}
function setIHTime(m){D.ihCustom=m;ihTotal=m*60;ihSecs=0;ihRunning=false;clearInterval(ihInterval);rIceHeat();}
function toggleIH(){
  if(ihRunning){clearInterval(ihInterval);ihRunning=false;document.getElementById('ih-toggle').textContent='Resume';}
  else{ihRunning=true;document.getElementById('ih-toggle').textContent='Pause';if(!ihSecs)ihSecs=D.ihCustom*60;startIHDisplay();}
}
function startIHDisplay(){
  clearInterval(ihInterval);
  var mw=D.ihMode==='ice'?'Ice':'Heat';
  speak(mw+' therapy started for '+Math.floor(D.ihCustom)+' minutes. Relax and breathe slowly.',true);
  ihInterval=setInterval(function(){
    var ihDisp=document.getElementById('ih-display');
    if(!ihRunning||!ihDisp){clearInterval(ihInterval);return;}
    ihSecs--;
    var m=String(Math.floor(ihSecs/60)).padStart(2,'0');
    var s=String(ihSecs%60).padStart(2,'0');
    ihDisp.textContent=m+':'+s;
    var half=Math.floor(D.ihCustom*30);
    if(ihSecs===half)speak('Halfway through. Keep it comfortable.',false);
    if(ihSecs===60)speak('One minute remaining.',false);
    if(ihSecs<=5&&ihSecs>0)beep(ihSecs%2===0?440:330,0.1);
    if(ihSecs<=0){
      clearInterval(ihInterval);ihRunning=false;ihSecs=0;
      speak(mw+' therapy complete! Well done. Gently remove the pack now.',true);
      confetti();toast((D.ihMode==='ice'?'❄️':'🔥')+' Therapy complete!');
    }
  },1000);
}
function resetIH(){clearInterval(ihInterval);ihRunning=false;ihSecs=0;rIceHeat();}

function startRest(){
  closeMod();
  exerciseCoachRest(D.restSecs);
  const total=D.restSecs;let secs=total;const circ=2*Math.PI*56;
  document.getElementById('rt-pause').textContent='Pause';clearInterval(rtInterval);rtRunning=true;document.getElementById('rest-mod').classList.add('open');
  function tick(){
    var rtn=document.getElementById('rt-n');var rtr=document.getElementById('rt-ring');
    if(!rtn||!rtr){clearInterval(rtInterval);return;}
    rtn.textContent=secs;
    rtr.style.strokeDasharray=(circ*(total-secs)/total)+' '+circ;
    if(secs===Math.floor(total/2))speak('Halfway. Keep breathing.',false);
    if(secs===10)speak('10 seconds.',false);
    if(secs<=3&&secs>0)beep(660,0.1);
    if(secs<=0){
      clearInterval(rtInterval);rtRunning=false;
      rtr.style.stroke='var(--ok)';
      document.getElementById('rt-pause').textContent='Done';
      speak('Rest complete. Get ready for the next set!',true);
      setTimeout(closeRest,1500);
    } else secs--;
  }
  tick();rtInterval=setInterval(tick,1000);
}
function togRest(){if(document.getElementById('rt-pause').textContent==='Done'){closeRest();return;}if(rtRunning){clearInterval(rtInterval);rtRunning=false;document.getElementById('rt-pause').textContent='Resume';}else{rtRunning=true;document.getElementById('rt-pause').textContent='Pause';startRest();}}
function closeRest(){clearInterval(rtInterval);rtRunning=false;document.getElementById('rest-mod').classList.remove('open');}

function rRunning(){

  RPLANS.forEach(function(p){
    plansHtml+='<div class="rplan-card'+(RS.activePlan===p.id?' sel':'')+'" style="background:'+p.bg+'" data-id="'+p.id+'" onclick="viewPlan(this.dataset.id)">'+

      '<div class="rplan-wks">📅 '+p.weeks+'wk · 🔥~'+p.cal+'cal</div>'+

  var histHtml='';
  if(hist.length){
    var rows='';
    hist.forEach(function(r){

function viewPlan(id){
  var plan=RPLANS.find(function(p){return p.id===id;});
  if(!plan)return;
  if(AC.enabled) speak(plan.name+'. '+plan.desc,false);
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});
  document.getElementById('s-run-detail').classList.add('on');
  var tagC={'Beginner':'#22C55E','Intermediate':'#FFB84D','Advanced':'#FF4D6A','Fat Burn':'#F97316','Post-Knee':'#00E5C0'};
  var col=tagC[plan.tag]||'#4A9EFF';
  var weekRows='';
  plan.schedule.forEach(function(w){
    var chips='';
    w.days.forEach(function(d){
      var s=d.sessions[0];
      var tl=s.t.toLowerCase();
      var cls=tl.includes('walk')?'pdc-walk':tl.includes('interval')||tl.includes('hiit')?'pdc-interval':tl.includes('rest')?'pdc-rest':'pdc-run';

function activatePlan(id){
  RS.activePlan=id;RS.planWeek=1;SS.s('activePlan',id);SS.s('planWeek',1);
  toast('🏃 Plan activated!');startPlanWeek(id,1);
}

function startPlanWeek(id,w){
  const plan=RPLANS.find(p=>p.id===id);if(!plan)return;
  const week=plan.schedule.find(wk=>wk.w===w);if(!week)return;
  RS.activePlan=id;RS.planWeek=w;SS.s('activePlan',id);SS.s('planWeek',w);
  RS.currentPlan=plan;RS.currentDay=week.days[0];
  RS.sessionPhases=week.days[0].sessions;
  showRunActive();
}

function startFreeRun(){

}

function toggleRun(){
  const btn=document.getElementById('run-btn');
  if(!RS.running){
    RS.running=true;RS.paused=false;
    runStartMs=Date.now()-RS.elapsed*1000;
    btn.textContent='⏸ PAUSE';btn.style.background='#FFB84D';
    var gpsDot=document.getElementById('gps-dot');if(gpsDot)gpsDot.style.display='block';
    document.getElementById('gps-status-bar').textContent='🛰 GPS Active — Tracking route';
    runInterval=setInterval(updateRunStats,1000);
    startGPS();
    // 🔊 Audio Coach: announce start
    runCoachStart(RS.currentPlan ? RS.currentPlan.name : null);
    // 🔊 Announce phases if plan has them
    if(RS.sessionPhases.length){
      var phaseDesc = RS.sessionPhases.map(function(p){return p.t+' for '+p.dur+' minutes';}).join(', then ');
      setTimeout(function(){ speak("Today's session: " + phaseDesc, false); }, 3000);
      RS.phaseIdx=0;RS.phaseElapsed=0;showCurrentPhase();
    }
  } else if(!RS.paused){
    RS.paused=true;runPausedMs=Date.now();
    clearInterval(runInterval);clearInterval(phaseInterval);
    if(RS.watchId){navigator.geolocation.clearWatch(RS.watchId);RS.watchId=null;}
    btn.textContent='▶ RESUME';btn.style.background='#22C55E';
    document.getElementById('gps-status-bar').textContent='⏸ Paused';
    speak('Run paused. Take a moment to catch your breath.', true);
  } else {
    RS.paused=false;runStartMs+=(Date.now()-runPausedMs);
    runInterval=setInterval(updateRunStats,1000);
    startGPS();
    if(RS.sessionPhases.length)showCurrentPhase();
    btn.textContent='⏸ PAUSE';btn.style.background='#FFB84D';
    document.getElementById('gps-status-bar').textContent='🛰 GPS Active — Tracking route';
    speak('Run resumed. Keep going!', true);
  }
}

function updateRunStats(){
  RS.elapsed++;
  var eTime=document.getElementById('s-time');
  var eDist=document.getElementById('s-dist');
  var ePace=document.getElementById('s-pace');
  var eCal=document.getElementById('s-cal');
  if(!eTime||!eDist||!ePace||!eCal){clearInterval(runInterval);return;}
  eTime.textContent=fmtTime(RS.elapsed);
  var dist=RS.distance;
  eDist.textContent=dist.toFixed(2);
  if(dist>0&&RS.elapsed>0){
    var pace=RS.elapsed/60/dist;var pm=Math.floor(pace);var ps=Math.round((pace-pm)*60);
    ePace.textContent=pm+':'+String(ps).padStart(2,'0');
  }
  var weight=D.bmi&&D.bmi.w?+D.bmi.w:70;
  var cal=Math.round(dist*weight*1.036);
  eCal.textContent=cal;
  runCoachUpdate(dist, RS.elapsed, RS.sessionPhases[RS.phaseIdx]?RS.sessionPhases[RS.phaseIdx].t:null);
  // Phase tracking
  if(RS.sessionPhases.length&&!RS.paused){
    RS.phaseElapsed++;
    const ph=RS.sessionPhases[RS.phaseIdx];
    if(ph){
      const total=ph.dur*60;const pct=Math.min(100,Math.round(RS.phaseElapsed/total*100));
      const rem=Math.max(0,total-RS.phaseElapsed);
      const fill=document.getElementById('cp-fill');const remEl=document.getElementById('cp-rem');
      if(fill)fill.style.width=pct+'%';
      if(remEl)remEl.textContent=rem>=60?Math.floor(rem/60)+'m':rem+'s';
      if(RS.phaseElapsed>=total){
        RS.phaseIdx++;RS.phaseElapsed=0;
        if(RS.phaseIdx<RS.sessionPhases.length){
          var nextPh=RS.sessionPhases[RS.phaseIdx];
          runCoachPhaseChange(nextPh.t, RS.sessionPhases[RS.phaseIdx+1]?RS.sessionPhases[RS.phaseIdx+1].t:null);
          showCurrentPhase();toast('🔄 '+nextPh.t+'!');
        } else{
          toast('✅ Session complete!');confetti();
          speak('Session complete! All phases done. Excellent run!', true);
        }
      }
    }
  }
}

function showCurrentPhase(){
  const ph=RS.sessionPhases[RS.phaseIdx];if(!ph)return;
  const isWalk=ph.t.toLowerCase().includes('walk');
  const col=isWalk?'#4A9EFF':'#22C55E';
  const ic=isWalk?'🚶':ph.t.toLowerCase().includes('interval')||ph.t.toLowerCase().includes('hiit')?'⚡':'🏃';
  const cpDiv=document.getElementById('cur-phase');if(cpDiv){cpDiv.style.display='block';}
  const nm=document.getElementById('cp-name');const cpIc=document.getElementById('cp-ic');
  if(nm){nm.textContent=ph.t;nm.style.color=col;}
  if(cpIc)cpIc.textContent=ic;
  const fill=document.getElementById('cp-fill');if(fill)fill.style.background=col;
  // Highlight current chip
  RS.sessionPhases.forEach((_,i)=>{
    const chip=document.getElementById('pc-'+i);
    if(chip)chip.style.opacity=i===RS.phaseIdx?'1':'0.4';
  });
}

function startGPS(){
  if(navigator.geolocation){
    RS.watchId=navigator.geolocation.watchPosition(
      pos=>{
        const{latitude:lat,longitude:lng}=pos.coords;
        if(RS.positions.length>0){const prev=RS.positions[RS.positions.length-1];RS.distance+=haversine(prev.lat,prev.lng,lat,lng);}
        RS.positions.push({lat,lng});updateMapDot(lat,lng);drawTrail();
      },
      ()=>{simulateGPS();},
      {enableHighAccuracy:true,maximumAge:2000,timeout:5000}
    );
  } else simulateGPS();
}

function simulateGPS(){
  // Simulate movement for demo
  clearInterval(phaseInterval);
  phaseInterval=setInterval(()=>{
    if(!RS.running||RS.paused||!document.getElementById('map-area'))return;
    RS.simAngle+=0.05+Math.random()*0.03;
    RS.simLat+=Math.cos(RS.simAngle)*0.00004;
    RS.simLng+=Math.sin(RS.simAngle)*0.00004;
    if(RS.positions.length>0){const prev=RS.positions[RS.positions.length-1];RS.distance+=haversine(prev.lat,prev.lng,RS.simLat,RS.simLng);}
    RS.positions.push({lat:RS.simLat,lng:RS.simLng});
    updateMapDot(RS.simLat,RS.simLng);drawTrail();
  },800);
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371;const dL=(lat2-lat1)*Math.PI/180;const dl=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function updateMapDot(lat,lng){
  const dot=document.getElementById('gps-dot');if(!dot)return;
  const area=document.getElementById('map-area');if(!area)return;
  const W=area.offsetWidth,H=area.offsetHeight;
  const pts=RS.positions;
  if(pts.length<2){dot.style.left='50%';dot.style.top='50%';return;}
  const lats=pts.map(p=>p.lat),lngs=pts.map(p=>p.lng);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats);
  const minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
  const pad=0.0001;
  const x=(lng-minLng+pad)/(maxLng-minLng+pad*2)*W;
  const y=(1-(lat-minLat+pad)/(maxLat-minLat+pad*2))*H;
  dot.style.left=Math.max(10,Math.min(W-10,x))+'px';
  dot.style.top=Math.max(10,Math.min(H-10,y))+'px';
}

function drawTrail(){
  var svg=document.getElementById('trail-svg');if(!svg||RS.positions.length<2)return;
  var area=document.getElementById('map-area');if(!area)return;
  var W=area.offsetWidth,H=area.offsetHeight;
  var pts=RS.positions;
  var lats=pts.map(function(p){return p.lat;}),lngs=pts.map(function(p){return p.lng;});
  var minLat=Math.min.apply(null,lats),maxLat=Math.max.apply(null,lats);
  var minLng=Math.min.apply(null,lngs),maxLng=Math.max.apply(null,lngs);
  var pad=0.0001;
  var toX=function(lng){return (lng-minLng+pad)/(maxLng-minLng+pad*2)*W;};
  var toY=function(lat){return (1-(lat-minLat+pad)/(maxLat-minLat+pad*2))*H;};
  var d='';
  pts.forEach(function(p,i){
    d+=(i===0?'M':'L')+toX(p.lng).toFixed(1)+','+toY(p.lat).toFixed(1)+' ';
  });
  svg.innerHTML='<path d="'+d+'" fill="none" stroke="var(--ac)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>';
}

function endRun(){
  clearInterval(runInterval);clearInterval(phaseInterval);
  if(RS.watchId){navigator.geolocation.clearWatch(RS.watchId);RS.watchId=null;}
  RS.running=false;RS.paused=false;
  const dist=RS.distance;const time=RS.elapsed;
  const weight=D.bmi&&D.bmi.w?+D.bmi.w:70;
  const cal=Math.round(dist*weight*1.036);
  if(dist>0.01){
    var rec={date:Date.now(),dist:dist,time:time,cal:cal,planId:RS.currentPlan?RS.currentPlan.id:null,planName:RS.currentPlan?RS.currentPlan.name:'Free Run'};
    RS.runHistory.push(rec);SS.s('runHistory',RS.runHistory);
    if(RS.currentPlan){RS.planWeek=Math.min(RS.planWeek+1,RS.currentPlan.weeks);SS.s('planWeek',RS.planWeek);}
    runCoachEnd(dist, time, cal);
    confetti();toast('🏃 Run saved! '+dist.toFixed(2)+'km · '+cal+'cal');
  } else { speak('Run ended. Keep up the great work!', true); toast('Run ended'); }
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');var ts=t.getAttribute('data-s');if(ts==='running')t.classList.add('on');});
  renderScr('running');D.tab='running';
}

function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function toggleMute(){toggleAudioCoach();}

function toggleMedPause(){
  var btn=document.getElementById('ma-pause-btn');
  if(!MS.running){
    MS.running=true;MS.paused=false;
    if(btn)btn.textContent='Pause';
    if(MS.activeBreath){
      speak('Beginning in 3, 2, 1.',true);
      setTimeout(function(){beep(880,0.3);runBreathCycle();},3500);
    } else if(MS.activeMed){
      speak('Let us begin. Find a comfortable position and close your eyes.',true);
      setTimeout(function(){runMedStep();},3000);
    }
  } else if(!MS.paused){
    MS.paused=true;clearInterval(MS.interval);clearInterval(MS.medInterval);
    if(btn)btn.textContent='Resume';
  } else {
    MS.paused=false;
    if(btn)btn.textContent='Pause';
    if(MS.activeBreath)runBreathCycle();
    else if(MS.activeMed)runMedStep();
  }
}

function mEl(id){return document.getElementById(id);}
function mSet(id,prop,val){var el=mEl(id);if(el){if(prop==='text')el.textContent=val;else el.style[prop]=val;}}
function runBreathCycle(){
  clearInterval(MS.interval);
  var bt=MS.activeBreath;if(!bt)return;
  var phase=bt.phases[MS.phaseIdx];if(!phase)return;
  MS.countdown=phase.dur;
  var circ=2*Math.PI*90;
  mSet('ma-phase','text',phase.name);
  mSet('ma-count','text',MS.countdown);
  mSet('ma-instr','text',phase.instr);
  mSet('ma-ring','stroke',phase.color);
  mSet('ma-ring','strokeDasharray','0 '+circ);
  breathCoachPhase(phase.name, phase.dur);
  MS.interval=setInterval(function(){
    if(MS.paused)return;
    if(!mEl('ma-ring')){clearInterval(MS.interval);return;}
    var elapsed=phase.dur-MS.countdown+1;
    var pct=elapsed/phase.dur;
    mSet('ma-ring','strokeDasharray',(circ*pct)+' '+circ);
    MS.countdown--;
    if(MS.countdown>=0) mSet('ma-count','text',MS.countdown);
    // Beep on each count
    if(MS.countdown>=0){
      var isIn=phase.name.toLowerCase().includes('in')||phase.name.toLowerCase().includes('inhale');
      beep(isIn?660:440,0.08);
    }
    if(MS.countdown<0){
      clearInterval(MS.interval);
      MS.phaseIdx++;
      if(MS.phaseIdx>=bt.phases.length){
        MS.phaseIdx=0;MS.cycle++;
        mSet('ma-cycle','text','CYCLE '+(MS.cycle+1)+' OF '+MS.totalCycles);
        breathCoachCycle(MS.cycle, MS.totalCycles);
        if(MS.cycle>=MS.totalCycles){
          mSet('ma-phase','text','Complete! 🎉');
          mSet('ma-count','text','');
          mSet('ma-instr','text','Session complete. Take a moment to rest in stillness.');
          breathCoachComplete(bt.name);
          confetti();toast('🧘 Breathing session complete!');
          logMedSession();
          return;
        }
      }
      runBreathCycle();
    }
  },1000);
}

function runMedStep(){
  clearInterval(MS.medInterval);
  var med=MS.activeMed;if(!med)return;
  if(!mEl('ma-ring'))return;
  var stepDur=Math.round(med.dur*60/med.script.length);
  var circ=2*Math.PI*90;
  var secs=stepDur;
  mSet('ma-phase','text',med.ic+' Step '+(MS.medStep+1));
  mSet('ma-count','text','');
  mSet('ma-instr','text',med.script[MS.medStep]);
  mSet('ma-cycle','text','STEP '+(MS.medStep+1)+' OF '+med.script.length);
  mSet('ma-ring','strokeDasharray','0 '+circ);
  mSet('ma-ring','stroke',med.color);
  medCoachStep(med.script[MS.medStep], MS.medStep+1, med.script.length);
  MS.medInterval=setInterval(function(){
    if(MS.paused)return;
    if(!mEl('ma-ring')){clearInterval(MS.medInterval);return;}
    var pct=(stepDur-secs)/stepDur;
    mSet('ma-ring','strokeDasharray',(circ*pct)+' '+circ);
    secs--;
    if(secs<0){
      clearInterval(MS.medInterval);
      MS.medStep++;
      if(MS.medStep>=med.script.length){
        mSet('ma-phase','text','Complete! 🌟');
        mSet('ma-instr','text','Meditation complete. Gently return to the present moment.');
        medCoachComplete(med.name);
        confetti();toast('🧘 Meditation complete!');
        logMedSession();
      } else runMedStep();
    }
  },1000);
}

// 🎙️ AUDIO COACH SYSTEM
// Uses Web Speech API (speechSynthesis) - works offline
// ══════════════════════════════════════════════════════════

var AC = {
  enabled: SS.g('audioCoach', true),
  voice: null,
  rate: SS.g('speechRate', 0.9),
  pitch: SS.g('speechPitch', 1.0),
  volume: SS.g('speechVol', 1.0),
  queue: [],
  speaking: false,
  beepCtx: null,
};

// Init audio coach - find best voice
function initAudioCoach() {
  if (!window.speechSynthesis) return;
  function loadVoices() {
    var voices = window.speechSynthesis.getVoices();
    // Prefer Indian English or clear English voices
    var preferred = voices.find(function(v) {
      return v.lang === 'en-IN' && v.localService;
    }) || voices.find(function(v) {
      return v.lang === 'en-IN';
    }) || voices.find(function(v) {
      return v.lang.startsWith('en') && v.localService;
    }) || voices.find(function(v) {
      return v.lang.startsWith('en');
    }) || voices[0];
    AC.voice = preferred;
  }
  loadVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
}

// Main speak function
function speak(text, priority) {
  if (!AC.enabled || !window.speechSynthesis) return;
  if (priority) {
    window.speechSynthesis.cancel();
    AC.queue = [];
  }
  var utter = new SpeechSynthesisUtterance(text);
  if (AC.voice) utter.voice = AC.voice;
  utter.rate = AC.rate;
  utter.pitch = AC.pitch;
  utter.volume = AC.volume;
  utter.onend = function() { AC.speaking = false; };
  AC.speaking = true;
  window.speechSynthesis.speak(utter);
}

// Beep sound using Web Audio API
function beep(freq, dur, type) {
  try {
    if (!AC.enabled) return;
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq || 880;
    osc.type = type || 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (dur || 0.3));
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + (dur || 0.3));
  } catch(e) {}
}

// Countdown beeps (3-2-1-GO)
function countdownBeeps(cb) {
  if (!AC.enabled) { if (cb) cb(); return; }
  speak('3', true);
  setTimeout(function() { beep(660, 0.2); speak('2'); }, 1000);
  setTimeout(function() { beep(660, 0.2); speak('1'); }, 2000);
  setTimeout(function() { beep(880, 0.4); speak('Go!', true); if (cb) cb(); }, 3000);
}

// Toggle audio coach
function toggleAudioCoach() {
  AC.enabled = !AC.enabled;
  SS.s('audioCoach', AC.enabled);
  if (AC.enabled) {
    speak('Audio coach enabled. Ready to guide your session.', true);
    toast('🔊 Audio Coach ON');
  } else {
    window.speechSynthesis && window.speechSynthesis.cancel();
    toast('🔇 Audio Coach OFF');
  }
  // Update any visible toggle
  var toggleEl = document.getElementById('ac-toggle');
  if (toggleEl) toggleEl.className = 'toggle' + (AC.enabled ? ' on' : '');
}

// ══ RUNNING AUDIO COACH ══
var runAudio = {
  lastKm: 0,
  lastMin: 0,
  encourageIdx: 0,
  encouragements: [
    'Great pace! Keep it up!',
    'You are doing amazing! Stay strong!',
    'Excellent form! Keep moving!',
    'Halfway there! Push through!',
    'Your knee is getting stronger with every step!',
    'Breathe steady. You have got this!',
    'Incredible effort! Keep going!',
    'Every step builds strength. Keep running!'
  ]
};

function runCoachStart(planName) {
  runAudio.lastKm = 0;
  runAudio.lastMin = 0;
  runAudio.encourageIdx = 0;
  if (planName) {
    speak('Starting ' + planName + '. Let\'s go! Remember to warm up before picking up pace.', true);
  } else {
    speak('Free run started. GPS tracking active. Run at a comfortable pace.', true);
  }
}

function runCoachUpdate(dist, elapsed, phase) {
  if (!AC.enabled) return;
  var km = Math.floor(dist * 10) / 10;
  var mins = Math.floor(elapsed / 60);
  // Announce each 0.5km milestone
  if (km > 0 && km !== runAudio.lastKm && (km * 10) % 5 === 0) {
    runAudio.lastKm = km;
    beep(880, 0.3);
    var pace = elapsed > 0 && dist > 0 ? Math.round(elapsed / 60 / dist) : 0;
    speak(km + ' kilometre' + (km > 1 ? 's' : '') + '. Current pace ' + pace + ' minutes per kilometre.', false);
  }
  // Encouragement every 3 minutes (changed to 5 for less interruption)
  if (mins > 0 && mins !== runAudio.lastMin && mins % 3 === 0) {
    runAudio.lastMin = mins;
    var msg = runAudio.encouragements[runAudio.encourageIdx % runAudio.encouragements.length];
    runAudio.encourageIdx++;
    // Don't overlap with km announcements
    setTimeout(function() { speak(msg); }, km !== runAudio.lastKm ? 500 : 1500);
  }
  // 10-second warning before phase ends
  if (RS.sessionPhases.length && RS.sessionPhases[RS.phaseIdx]) {
    var ph = RS.sessionPhases[RS.phaseIdx];
    var remaining = ph.dur * 60 - RS.phaseElapsed;
    if (remaining === 10) {
      var next = RS.sessionPhases[RS.phaseIdx + 1];
      speak('10 seconds. ' + (next ? 'Get ready for ' + next.t + '.' : 'Almost done!'), false);
    }
    if (remaining === 30 && ph.dur * 60 > 60) {
      speak('30 seconds remaining in ' + ph.t + '.', false);
    }
  }
}

function runCoachPhaseChange(phase, nextPhase) {
  if (!AC.enabled) return;
  beep(660, 0.25);
  setTimeout(function() { beep(880, 0.25); }, 300);
  var msg = phase ? phase + ' now!' : 'Phase complete!';
  if (nextPhase) msg += ' Next up: ' + nextPhase + '.';
  speak(msg, true);
}

function runCoachEnd(dist, time, cal) {
  beep(880, 0.2);
  setTimeout(function() { beep(1100, 0.2); }, 250);
  setTimeout(function() { beep(1320, 0.4); }, 500);
  var mins = Math.floor(time / 60);
  var secs = time % 60;

// ══ BREATHING AUDIO COACH ══
var breathInstructions = {
  'Breathe In':    'Inhale slowly through your nose.',
  'Belly Breathe In': 'Breathe deep into your belly. Feel it rise.',
  'Power Inhale':  'Strong nasal breath, fill from bottom to top.',
  'Hold':          'Hold gently. Stay relaxed.',
  'Pause':         'Brief natural pause.',
  'Brief Hold':    'Short hold. Feel the oxygen.',
  'Breathe Out':   'Exhale slowly through your mouth.',
  'Belly Breathe Out': 'Exhale slowly as your belly falls.',
  'Steady Exhale': 'Controlled exhale. Engage your core.',
  'Long Exhale':   'Long slow exhale. Release all tension.',
};

function breathCoachPhase(phaseName, dur) {
  if (!AC.enabled) return;
  beep(phaseName.includes('Out') || phaseName.includes('Exhale') ? 440 : 660, 0.15);
  var instr = breathInstructions[phaseName] || phaseName + ' for ' + dur + ' counts.';
  speak(instr, true);
}

function breathCoachCycle(cycle, total) {
  if (!AC.enabled) return;
  if (cycle < total) {
    speak('Cycle ' + cycle + ' complete. ' + (total - cycle) + ' more to go. Stay focused.', false);
  }
}

function breathCoachComplete(name) {
  beep(880, 0.2);
  setTimeout(function() { beep(1100, 0.3); }, 300);
  speak('Breathing session complete. Excellent focus! Your nervous system is now calmer. Take a moment to notice how you feel.', true);
}

// ══ EXERCISE AUDIO COACH ══
function exerciseCoachStart(name, sets, reps, hold) {
  if (!AC.enabled) return;
  var msg = name + '. ';
  if (sets && sets !== '-' && sets !== 'nan') msg += sets + ' sets. ';
  if (reps && reps !== '-' && reps !== 'nan') msg += reps + ' repetitions. ';
  if (hold && hold !== '-' && hold !== 'nan') msg += 'Hold for ' + hold + ' each rep. ';
  msg += 'Focus on controlled movement.';
  speak(msg, true);
}

function exerciseCoachSet(setNum, totalSets) {
  if (!AC.enabled) return;
  beep(660, 0.2);
  speak('Set ' + setNum + ' of ' + totalSets + '.', false);
}

function exerciseCoachComplete() {
  if (!AC.enabled) return;
  beep(880, 0.25);
  speak('Well done! Exercise complete. Take your rest.', true);
}

function exerciseCoachRest(secs) {
  if (!AC.enabled) return;
  speak('Rest for ' + secs + ' seconds. Breathe and recover.', true);
  if (secs >= 10) {
    setTimeout(function() {
      speak('10 seconds remaining.', false);
    }, (secs - 10) * 1000);
  }
  setTimeout(function() {
    beep(880, 0.3);
    speak('Rest complete. Get ready for the next set.', true);
  }, secs * 1000);
}

// ══ MEDITATION AUDIO COACH ══
function medCoachStep(text, stepNum, totalSteps) {
  if (!AC.enabled) return;
  if (stepNum === 1) {
    speak('Beginning meditation. ' + text, true);
  } else if (stepNum === totalSteps) {
    speak(text + ' Stay here as long as you like.', false);
  } else {
    speak(text, false);
  }
}

function medCoachComplete(name) {
  beep(440, 0.3);
  setTimeout(function() { beep(550, 0.3); }, 400);
  setTimeout(function() { beep(660, 0.5); }, 800);
  speak('Meditation complete. ' + name + ' session finished. Gently bring your awareness back. You are refreshed and at peace.', true);
}

// ══ PHYSIO SESSION COACH ══
function sessionCoachStart(day, phase, exCount) {
  if (!AC.enabled) return;
  speak('Welcome to your ' + day + ' session. ' + phase + ' phase. ' + exCount + ' exercises planned today. Let\'s begin!', true);
}

function sessionCoachSectionChange(section) {
  if (!AC.enabled) return;
  beep(660, 0.2);
  var msgs = {
    'Warm-Up': 'Starting warm up. Prepare your body gently.',
    'Main Exercise': 'Warm up complete. Beginning main exercises. Focus on form.',
    'Cool-Down': 'Main exercises done! Great work. Starting cool down.',
  };
  speak(msgs[section] || section + ' phase.', true);
}

function sessionCoachComplete(done, total) {
  beep(880, 0.2);
  setTimeout(function() { beep(1100, 0.2); }, 250);
  setTimeout(function() { beep(1320, 0.4); }, 500);
  speak('Session complete! You completed ' + done + ' out of ' + total + ' exercises. Excellent dedication to your recovery!', true);
}

  HEX.cat = catId;
  SS.s('hexCat', catId);
  var scr = document.getElementById('s-homeex-cat');
  if(!scr) return;
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});
  scr.classList.add('on');

  var levels = ['All','Beginner','Intermediate','Advanced'];
  var filterPills = levels.map(function(l){
    return '<div class="filter-pill'+(HEX.filter===l?' on':'')+'" data-lvl="'+l+'" onclick="hexFilter(this.dataset.lvl,this)">'+l+'</div>';

// ── EXERCISE TIMER ───────────────────────────────────────────────
function hexTimerToggle(){
  var btn = document.getElementById('hex-timer-btn');
  if(!HEX.exTimerRunning){
    HEX.exTimerRunning = true;
    if(btn) btn.textContent = 'Pause';
    speak('Timer started.',true);
    var cat = HOME_CATS.find(function(c){return c.id===HEX.cat;});
    var col = cat?cat.color:'var(--ac)';
    HEX.exTimer = setInterval(function(){
      if(!HEX.exTimerRunning) return;
      HEX.exTimerSecs--;
      var disp = document.getElementById('hex-timer-disp');
      if(disp) disp.textContent = fmtTime(HEX.exTimerSecs);
      if(HEX.exTimerSecs===10) speak('10 seconds remaining.',false);
      if(HEX.exTimerSecs<=3&&HEX.exTimerSecs>0) beep(660,0.1);
      if(HEX.exTimerSecs<=0){
        clearInterval(HEX.exTimer);HEX.exTimerRunning=false;
        beep(880,0.3); setTimeout(function(){beep(1100,0.4);},350);
        speak('Done! Excellent work. Rest for '+HEX.activeEx.rest+' seconds.',true);
        if(btn) btn.textContent='Restart';
        if(disp) disp.textContent='✓ Done!';
      }
    },1000);
  } else {
    HEX.exTimerRunning = false;
    clearInterval(HEX.exTimer);
    if(btn) btn.textContent='Resume';
    speak('Paused.',true);
  }
}

function hexTimerReset(){
  clearInterval(HEX.exTimer);
  HEX.exTimerRunning=false;
  HEX.exTimerSecs=HEX.activeEx?HEX.activeEx.time:30;
  var disp=document.getElementById('hex-timer-disp');
  if(disp)disp.textContent=fmtTime(HEX.exTimerSecs);
  var btn=document.getElementById('hex-timer-btn');
  if(btn)btn.textContent='Start';
}

// ── AUDIO COACH FOR HOME EXERCISE ───────────────────────────────
function hexCoachStart(){
  var ex = HEX.activeEx;
  if(!ex){speak('No exercise selected.',true);return;}
  if(!AC.enabled){toast('Enable Audio Coach in Settings first');return;}
  // Full guided walkthrough
  speak(ex.name+'. Let us begin!',true);
  var delay = 2000;
  ex.steps.forEach(function(step,i){
    setTimeout(function(){
      beep(660,0.15);
      speak('Step '+(i+1)+'. '+step,true);
    }, delay);
    delay += (step.length * 60) + 1500;
  });
  setTimeout(function(){
    beep(880,0.3);
    speak('Instructions complete. Now perform '+ex.sets+' sets of '+ex.reps+'. Rest '+ex.rest+' seconds between each set. You can do this!',true);
  }, delay);
}

// ── START FULL WORKOUT ───────────────────────────────────────────
function startHexWorkout(catId){
  var cat = HOME_CATS.find(function(c){return c.id===catId;});
  var exList = HOME_EXERCISES[catId]||[];
  if(!exList.length) return;
  if(AC.enabled){
    speak('Starting '+cat.name+' workout. '+exList.length+' exercises. No equipment needed. Let\'s go!',true);
  }
  // Open first exercise
  openHexDetail(catId, exList[0].id);
  toast('Workout started! '+exList.length+' exercises');
}

// ═══ START ═══
init();
</script>
